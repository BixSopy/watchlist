<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Watchlist Pierre</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  /* COULEURS — fond profond (#1) */
  --bg:#0a0a0c;--bg2:#101013;--bg3:#17171b;--bg4:#1e1e23;--bg5:#27272e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f0;--text2:#888;--text3:#444;
  --accent:#5cc8ff;--accent-dim:rgba(92,200,255,0.12);--accent-dim2:rgba(92,200,255,0.35);
  --red:#e84b4b;--green:#4be87a;
  /* TRANSITIONS variées (#5) */
  --tr:0.16s ease;--tr-fast:0.08s ease;--tr-slow:0.28s cubic-bezier(.4,0,.2,1);
  /* BORDER-RADIUS harmonisé (#3) — 4 valeurs */
  --r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;
  /* SHADOWS (#2) */
  --shadow-card:0 2px 8px rgba(0,0,0,.55),0 1px 2px rgba(0,0,0,.4);
  --shadow-card-hover:0 8px 28px rgba(0,0,0,.75),0 0 0 1px rgba(92,200,255,.13);
  --shadow-modal:0 24px 64px rgba(0,0,0,.8),0 8px 24px rgba(0,0,0,.5);
  --shadow-poster:0 8px 32px rgba(0,0,0,.6)
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(0,0,0,0.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 28px;height:62px;display:flex;align-items:center;gap:20px}
.logo{font-family:'Nunito',sans-serif;font-size:22px;font-weight:900;letter-spacing:-.5px;color:#fff}
.logo em{color:var(--accent);font-style:normal}
.logo sub{font-weight:400;color:var(--text2);font-size:15px;margin-left:3px;vertical-align:baseline}
.hstats{display:flex;gap:10px;margin-left:auto;align-items:center}
.pill{font-size:12px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);padding:3px 10px;border-radius:20px}
.pill b{color:var(--text);font-weight:600}
.hbtn{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:var(--tr-slow)}
.hbtn:hover{color:var(--text);border-color:var(--border2)}.hbtn svg{width:15px;height:15px}
/* SEARCH BAR HEADER */
.search-bar{margin-left:18px;position:relative;width:min(340px,32vw);min-width:180px;display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:0 12px 0 34px;height:36px;transition:border-color var(--tr),box-shadow var(--tr)}
.search-bar:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(92,200,255,.10)}
.search-bar>svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3);pointer-events:none}
.search-bar input{flex:1;min-width:0;background:none;border:none;outline:none;color:var(--text);font-size:13px;font-family:'IBM Plex Sans',sans-serif}
.search-bar input::placeholder{color:var(--text3)}
/* SEARCH MODAL */
.search-modal{display:none;position:fixed;inset:0;z-index:2500;background:rgba(0,0,0,.9);backdrop-filter:blur(12px);padding:18px}
.search-modal.on{display:flex;align-items:stretch;animation:fadeIn .16s ease}
.search-modal-wrap{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-xl);box-shadow:var(--shadow-modal);display:flex;flex-direction:column;overflow:hidden}
.search-modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-modal-sub{font-size:12px;color:var(--text3);margin-top:3px}
.search-modal-toolbar{display:flex;align-items:center;gap:12px;padding:14px 22px;border-bottom:1px solid var(--border);flex-shrink:0}
.search-modal-input-wrap{position:relative;flex:1}
.search-modal-input-wrap>svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text3)}
.search-modal-input-wrap input{width:100%;height:42px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:13px;border-radius:10px;outline:none;padding:0 12px 0 38px;transition:var(--tr)}
.search-modal-input-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(92,200,255,.10)}
.search-modal-input-wrap input::placeholder{color:var(--text3)}
.search-page-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.search-page-ind{min-width:58px;text-align:center;font-size:12px;color:var(--text2);font-family:'IBM Plex Mono',monospace}
.search-state{padding:8px 22px 0;font-size:12px;color:var(--text3);flex-shrink:0}
.search-results{flex:1;overflow:auto;padding:16px 22px 100px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;align-content:start}
.search-results::-webkit-scrollbar{width:4px}.search-results::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:10px}
.search-card{position:relative;display:flex;gap:12px;min-height:175px;background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;transition:transform var(--tr-slow),box-shadow var(--tr-slow),border-color var(--tr)}
.search-card:hover{transform:translateY(-2px) scale(1.005);border-color:rgba(92,200,255,.22);box-shadow:var(--shadow-card-hover)}
.search-card.selected{border-color:var(--accent);box-shadow:0 0 0 1px rgba(92,200,255,.28),0 8px 28px rgba(0,0,0,.6)}
.search-card.disabled{opacity:.55;cursor:default}.search-card.disabled:hover{transform:none;box-shadow:none;border-color:var(--border)}
/* CHECKBOX CUSTOM PREMIUM */
.search-check{position:absolute;top:10px;left:10px;z-index:3;width:30px;height:30px;border:none;background:none;padding:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.search-check-box{width:24px;height:24px;border-radius:8px;background:rgba(8,8,10,.86);border:1px solid rgba(255,255,255,.14);box-shadow:0 6px 18px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;color:transparent;transition:transform var(--tr),background var(--tr),border-color var(--tr),box-shadow var(--tr);backdrop-filter:blur(6px)}
.search-check:hover .search-check-box{transform:scale(1.06);border-color:rgba(92,200,255,.4);box-shadow:0 8px 22px rgba(0,0,0,.5),0 0 0 1px rgba(92,200,255,.1)}
.search-check.on .search-check-box{background:linear-gradient(180deg,rgba(92,200,255,.28),rgba(92,200,255,.14));border-color:rgba(92,200,255,.6);color:var(--accent);box-shadow:0 8px 24px rgba(0,0,0,.55),0 0 0 1px rgba(92,200,255,.2)}
.search-check svg{width:13px;height:13px}.search-check:not(.on) svg{opacity:0}
.search-check:disabled{cursor:not-allowed}.search-check:disabled .search-check-box{opacity:.4}
.search-poster-wrap{width:105px;height:158px;flex:0 0 105px;border-radius:8px;overflow:hidden;background:var(--bg4)}
.search-poster{width:105px;height:158px;object-fit:cover;display:block}
.search-poster-ph{width:105px;height:158px;display:flex;align-items:center;justify-content:center;background:var(--bg4);color:var(--text3);font-size:28px}
.search-body{flex:1;min-width:0;display:flex;flex-direction:column;padding-top:2px}
.search-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;padding-right:4px}
.search-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px}
.search-year{font-size:11px;color:var(--text3)}
.search-overview{font-size:12px;line-height:1.5;color:var(--text2);display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;margin-top:auto}
.search-status-tag{display:inline-flex;align-items:center;margin-top:8px;font-size:11px;font-weight:600;padding:4px 8px;border-radius:6px;width:max-content}
.search-status-tag.ok{background:rgba(92,200,255,.14);color:var(--accent);border:1px solid rgba(92,200,255,.22)}
.search-status-tag.off{background:rgba(255,255,255,.05);color:var(--text3);border:1px solid var(--border)}
.search-footer{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 22px;background:rgba(10,10,12,.96);border-top:1px solid var(--border);backdrop-filter:blur(12px);flex-shrink:0}
.search-counter{font-size:13px;color:var(--text2);font-weight:600}
.search-empty{padding:32px;text-align:center;color:var(--text3);border:1px dashed var(--border2);border-radius:12px;background:var(--bg3)}
.opt-menu{display:none !important;position:fixed;top:48px;right:12px;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-md);min-width:200px;box-shadow:var(--shadow-modal);z-index:100;overflow:hidden;animation:scaleIn .15s ease}
.opt-menu.on{display:flex !important;flex-direction:column}
.opt-btn{width:100%;padding:10px 14px;border:none;background:transparent;color:var(--text2);text-align:left;font-size:13px;cursor:pointer;transition:var(--tr-fast);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;font-family:'IBM Plex Sans',sans-serif}
.opt-btn:last-child{border-bottom:none}
.opt-btn:hover{background:var(--bg3);color:var(--text)}

/* LAYOUT */
.layout{display:flex;min-height:calc(100vh - 62px)}

/* SIDEBAR */
.sidebar{width:380px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);height:calc(100vh - 62px);position:sticky;top:62px;display:flex;flex-direction:column;overflow:hidden}
.sb-hdr{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.sb-title{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--text3);text-transform:uppercase}
.sb-refresh{background:none;border:1px solid var(--border);color:var(--text3);cursor:pointer;font-size:10px;padding:4px 8px;border-radius:6px;transition:var(--tr);display:flex;align-items:center;gap:4px;font-family:'IBM Plex Sans',sans-serif}
.sb-refresh:hover{color:var(--text);background:var(--bg3);border-color:var(--border2)}
.sb-refresh svg{width:10px;height:10px}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:auto}
.sb-scroll::-webkit-scrollbar{width:3px}.sb-scroll::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:10px}
.sb-section{padding:12px 14px 10px;border-bottom:1px solid var(--border)}
.sb-sec-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:10px;display:flex;align-items:center;gap:5px}
.sb-sec-title svg{width:11px;height:11px}
.reco-img{backface-visibility:hidden;transform:translateZ(0);}
.reco-img-wrap{will-change:transform;}
/* FOLDER CARD — PREMIUM */
.folder-card{position:relative;width:130px;flex-shrink:0;cursor:pointer;user-select:none}
.folder-stack{position:relative;width:130px;height:185px;margin-bottom:8px;transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.folder-card:hover .folder-stack{transform:translateY(-5px)}
.fs-img{position:absolute;border-radius:9px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.7);background:var(--bg4);transform-origin:bottom center;transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .3s}
.fs-img:nth-child(1){width:104px;height:156px;bottom:0;left:13px;transform:rotate(5deg);z-index:1;opacity:.55}
.fs-img:nth-child(2){width:110px;height:165px;bottom:0;left:10px;transform:rotate(2deg);z-index:2;opacity:.78}
.fs-img:nth-child(3){width:118px;height:177px;bottom:0;left:6px;transform:rotate(0deg);z-index:3}
.folder-card:hover .fs-img:nth-child(1){transform:rotate(9deg) translateX(4px);opacity:.65}
.folder-card:hover .fs-img:nth-child(2){transform:rotate(4deg) translateX(2px);opacity:.88}
.folder-card:hover .fs-img:nth-child(3){transform:rotate(-1deg);box-shadow:0 14px 36px rgba(0,0,0,.8)}
.fs-img img{width:100%;height:100%;object-fit:cover;display:block}
.fs-img .fs-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:22px}
.folder-badge{position:absolute;top:8px;right:8px;z-index:5;background:rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:10px;font-weight:700;padding:3px 7px;border-radius:5px;backdrop-filter:blur(8px);letter-spacing:.04em}
.folder-icon{position:absolute;bottom:10px;right:10px;z-index:5;width:24px;height:24px;border-radius:6px;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.folder-icon svg{width:13px;height:13px;color:rgba(255,255,255,.7)}
.folder-lbl{padding:0 4px}
.folder-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}
.folder-count{font-size:11px;color:var(--text3)}
/* FOLDER MODAL — PREMIUM */
.folder-mbk{display:none;position:fixed;inset:0;z-index:1800;background:rgba(0,0,0,.92);backdrop-filter:blur(16px);align-items:center;justify-content:center;padding:20px}
.folder-mbk.on{display:flex;animation:fadeIn .2s ease}
.folder-wrap{width:min(760px,96vw);max-height:90vh;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-xl);box-shadow:0 32px 80px rgba(0,0,0,.8);display:flex;flex-direction:column;overflow:hidden;position:relative}
.folder-hero{position:relative;height:180px;overflow:hidden;flex-shrink:0}
.folder-hero-bg{position:absolute;inset:-20px;width:calc(100%+40px);height:calc(100%+40px);object-fit:cover;filter:blur(22px) brightness(.28) saturate(.8);transform:scale(1.05)}
.folder-hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(7,8,10,.1) 0%,rgba(7,8,10,.7) 70%,var(--bg2) 100%)}
.folder-hero-content{position:absolute;bottom:18px;left:22px;right:22px;display:flex;align-items:flex-end;gap:16px}
.folder-hero-poster{width:72px;height:108px;border-radius:8px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.6);flex-shrink:0;border:1px solid rgba(255,255,255,.1);background:var(--bg4)}
.folder-hero-poster img{width:100%;height:100%;object-fit:cover;display:block}
.folder-hero-info{flex:1;min-width:0}
.folder-htitle{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px;margin-bottom:4px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.folder-hmeta{font-size:12px;color:rgba(255,255,255,.6)}
.folder-close-btn{position:absolute;top:14px;right:14px;z-index:10;width:32px;height:32px;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(8px);transition:var(--tr)}
.folder-close-btn:hover{background:rgba(255,255,255,.1)}
.folder-close-btn svg{width:14px;height:14px;color:#fff}
.folder-grid{flex:1;overflow-y:auto;padding:18px 22px 24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:14px;align-content:start}
.folder-grid::-webkit-scrollbar{width:4px}.folder-grid::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:10px}
.folder-item{cursor:pointer;transition:transform .25s cubic-bezier(.34,1.56,.64,1);animation:fadeIn .25s ease both}
.folder-item:hover{transform:translateY(-4px) scale(1.02)}
.folder-item-poster{width:100%;aspect-ratio:2/3;border-radius:8px;overflow:hidden;background:var(--bg4);box-shadow:var(--shadow-card);margin-bottom:6px;border:1px solid var(--border);transition:box-shadow .25s}
.folder-item:hover .folder-item-poster{box-shadow:0 10px 28px rgba(0,0,0,.7)}
.folder-item-poster img{width:100%;height:100%;object-fit:cover;display:block}
.folder-item-poster .fi-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:24px}
.folder-item-title{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.folder-item-year{font-size:10px;color:var(--text3);margin-top:2px}
.folder-detect-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;font-size:12px;border:1px solid var(--border2);border-radius:7px;background:var(--bg3);color:var(--text2);cursor:pointer;transition:var(--tr);white-space:nowrap}
.folder-detect-btn:hover{background:var(--bg4);color:var(--text);border-color:var(--accent)}
/* SAGA FIELD */
.field-saga{position:relative}
.field-saga input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 10px;outline:none;transition:var(--tr)}
.field-saga input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(92,200,255,.08)}
.reco-card{display:flex;align-items:flex-start;gap:11px;padding:9px 0;border-bottom:1px solid var(--border);min-height:183px;box-sizing:border-box}
.reco-card:last-child{border-bottom:none}
.reco-img-wrap{flex-shrink:0;border-radius:var(--r-sm);overflow:hidden;cursor:pointer;transition:transform var(--tr-slow),box-shadow var(--tr-slow);width:110px;height:165px;box-shadow:var(--shadow-card);background:var(--bg4);flex-basis:110px}
.reco-img-wrap:hover{transform:scale(1.06);box-shadow:0 12px 32px rgba(0,0,0,.7)}
.reco-img{width:110px;height:165px;object-fit:cover;display:block;background:var(--bg4)}
.reco-img-ph{width:110px;height:165px;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--text3)}
.reco-body{flex:1;min-width:0;padding-top:3px}
.reco-title{font-size:13px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.reco-year{font-size:11px;color:var(--text3);margin-bottom:8px}
.reco-score{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:10px}
.reco-btns{display:flex;gap:7px}
.rbtn{padding:6px 12px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'IBM Plex Sans',sans-serif;color:var(--text2)}
.rbtn:hover{color:#000}.rbtn.add:hover{background:var(--accent);border-color:var(--accent)}.rbtn.no:hover{background:var(--red);border-color:var(--red);color:#fff}
.sb-loading{padding:12px 14px 10px}
.sb-skeleton-card{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid var(--border);animation:skeletonPulse 1.6s ease-in-out infinite}
.sb-skeleton-card:last-child{border-bottom:none}
.sk-img{width:110px;height:165px;background:var(--bg4);border-radius:var(--r-sm);flex-shrink:0}
.sk-body{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.sk-title{height:12px;background:var(--bg3);border-radius:4px;width:90%}
.sk-meta{height:10px;background:var(--bg4);border-radius:3px;width:60%}
.sb-spin{width:22px;height:22px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}

/* MAIN */
.main{flex:1;min-width:0;display:flex;flex-direction:column}

/* NAV */
.nav{display:flex;align-items:center;padding:0;border-bottom:none;background:transparent;gap:2px;flex-shrink:0;padding-left:28px}
.ntab{font-family:'Nunito',sans-serif;font-size:18px;font-weight:800;padding:17px 20px;cursor:pointer;color:var(--text3);border:none;border-bottom:3px solid transparent;background:none;transition:var(--tr);letter-spacing:-.3px;white-space:nowrap;position:relative}
.ntab:hover{color:var(--text2)}.ntab.on{color:var(--text);border-bottom-color:var(--accent);border-bottom-width:3px}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;padding:13px 28px 13px 0;border-bottom:1px solid var(--border)}
.add-btn{display:flex;align-items:center;gap:6px;background:var(--accent);color:#000;border:none;padding:8px 14px;border-radius:var(--r-md);font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr-slow);white-space:nowrap}
.add-btn:hover{background:#7ad4ff;box-shadow:0 4px 16px rgba(92,200,255,.25)}.add-btn svg{width:13px;height:13px}

/* CONTENT */

/* DISCOVER ROWS — NETFLIX STYLE */

.dr-row-inner{display:flex;gap:10px;overflow-x:hidden;padding:6px 48px 10px}
.dr-card{flex-shrink:0;width:var(--dr-card-w,126px);cursor:pointer;transition:transform .28s cubic-bezier(.34,1.56,.64,1)}

.dr-poster-wrap{width:var(--dr-card-w,126px);height:var(--dr-card-h,189px);border-radius:9px;overflow:hidden;background:var(--bg4);box-shadow:var(--shadow-card);margin-bottom:7px;border:1px solid var(--border);transition:box-shadow .28s}

.dr-title{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}

.dr-score{font-size:10px;color:var(--accent);font-weight:700}

/* SECTION HEADERS */

.ec-title{font-size:11px;font-weight:600;color:var(--text);display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px}

.card-ph{width:100%;aspect-ratio:2/3;background:var(--bg4);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:28px}
.card-body{padding:9px 11px 11px}

.bf{background:rgba(92,200,255,.15);color:#8ad6ff}.bs{background:rgba(75,232,122,.12);color:#6de89a}.ba{background:rgba(255,165,80,.15);color:#ffb060}

.ibtn:hover{color:var(--text)}.ibtn.del:hover{color:var(--red);border-color:rgba(232,75,75,.4)}.ibtn svg{width:12px;height:12px}

.alert-wrap{display:none;background:var(--accent-dim);border:1px solid var(--accent-dim2);border-radius:10px;padding:11px 14px;margin-bottom:16px;align-items:center;gap:10px}

.plex-body{overflow-y:auto;padding:20px 26px 26px;flex:1}
.plex-body::-webkit-scrollbar{width:4px}.plex-body::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:10px}
.plex-acts{display:flex;gap:9px;margin-bottom:18px;flex-wrap:wrap}
.btn-trailer{background:rgba(255,80,80,.12);color:#ff7070;border:1px solid rgba(255,80,80,.3);display:flex;align-items:center;gap:5px}
.btn-trailer svg{width:13px;height:13px}.btn-trailer:hover{background:rgba(255,80,80,.25)}
.s-sel{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:16px}
.s-btn{font-size:11px;padding:5px 12px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);color:var(--text2);cursor:pointer;transition:var(--tr);font-family:'IBM Plex Mono',monospace}
.s-btn:hover{color:var(--text);border-color:var(--border2)}.s-btn.on{background:var(--accent);color:#000;border-color:var(--accent);font-weight:600}
.plex-nep{background:var(--accent-dim);border:1px solid var(--accent-dim2);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);margin-bottom:14px;display:none}
.plex-nep.on{display:block}.plex-nep b{color:var(--accent)}
.plex-overview{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:18px}
.plex-stats{display:flex;gap:20px;margin-bottom:18px;flex-wrap:wrap}
.p-stat-l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.p-stat-v{font-size:17px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--text)}
.p-stat-v.gold{color:var(--accent)}
.providers{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.prov-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--border2);background:var(--bg3);cursor:pointer;transition:var(--tr);text-decoration:none;font-size:12px;font-weight:500;color:var(--text)}
.prov-btn:hover{background:var(--bg4)}.prov-logo{width:22px;height:22px;border-radius:5px;object-fit:cover}
.sec-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;font-weight:600}
.cast-row{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;margin-bottom:18px}
.cast-row::-webkit-scrollbar{height:3px}.cast-row::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:10px}
.cast-item{flex-shrink:0;width:70px;text-align:center;cursor:pointer;transition:var(--tr);text-decoration:none}
.cast-item:hover{transform:translateY(-2px);opacity:.85}
.cast-photo{width:70px;height:70px;border-radius:50%;object-fit:cover;background:var(--bg4);margin-bottom:5px;display:block}
.cast-ph{width:70px;height:70px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:20px;margin-bottom:5px}
.cast-name{font-size:10px;color:var(--text);line-height:1.2;font-weight:500}
.cast-role{font-size:9px;color:var(--text3);line-height:1.2;margin-top:1px}
.prog-detail{margin-bottom:16px}
.prog-d-row{display:flex;align-items:center;gap:12px;margin-bottom:5px}
.prog-d-val{font-size:17px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--text)}
.prog-d-track{height:5px;background:var(--bg5);border-radius:3px;overflow:hidden;flex:1;max-width:220px}
.prog-d-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .4s}
.prog-d-lbl{font-size:11px;color:var(--text3)}

/* STATS MODAL */
.modal-stats{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r-xl);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;padding:26px;animation:scaleIn .2s ease;box-shadow:var(--shadow-modal)}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;box-shadow:var(--shadow-card)}
.stat-lbl{font-size:11px;color:var(--text2);margin-bottom:5px}
.stat-val{font-size:24px;font-weight:600;font-family:'IBM Plex Mono',monospace;color:var(--text)}
.stat-val.a{color:var(--accent)}
.stat-sec{margin-bottom:20px}
.stat-sec-title{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text2);margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:7px}
.bar-lbl{font-size:12px;color:var(--text2);min-width:70px}
.bar-track{flex:1;height:8px;background:var(--bg4);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .5s}
.bar-val{font-size:12px;color:var(--text);font-weight:600;min-width:30px;text-align:right;font-family:'IBM Plex Mono',monospace}
.compat-box{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:16px;font-size:13px;line-height:1.6;color:var(--text2)}
.compat-box b{color:var(--accent)}

/* ANIMATIONS */
@keyframes spin{to{transform:translateY(-50%) rotate(360deg)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
@keyframes toastSlide{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
@keyframes newepPulse{0%,100%{box-shadow:0 0 0 0 rgba(92,200,255,.55),0 0 0 0 rgba(92,200,255,.25)}50%{box-shadow:0 0 0 4px rgba(92,200,255,.2),0 0 0 8px rgba(92,200,255,0)}}

var PROXY='';
/* Retourne une URL image passant par le proxy local (same-origin → canvas safe) */
function proxied(url){return url?PROXY+encodeURIComponent(url):'';}
/* Version proxy de IB pour canvas/ambient (pas pour <img> normaux) */
function IBp(size,p){return p?proxied(IB+size+p):null;}
/* STATE */

function tone(f,d,t,v,dl){
  if(!soundOn)return;var ac=getAC();if(!ac)return;
  var ts=ac.currentTime+(dl||0);
  var o=ac.createOscillator(),g=ac.createGain();
  o.type=t||'sine';o.frequency.value=f;o.connect(g);g.connect(ac.destination);

  o.start(ts);o.stop(ts+d);

/* ANIME GENRE DETECT */
var KW_SHONEN=['shonen','shounen','superpower','martial arts','ninja','pirate','demon slayer','dragon ball'];
var KW_SEINEN=['seinen','psychological','thriller','berserk','vinland','mature','gore'];
var KW_SHOJO=['shojo','shoujo','romance','magical girl','fruits basket'];
var KW_ISEKAI=['isekai','another world','reincarnation','transported','summoned to'];
var KW_SLICE=['slice of life','daily life','school life','coming of age','moe','everyday'];
function detectAnimeGenre(tmdbId,cb){
  tf(TB+'/tv/'+tmdbId+'?api_key='+TKEY+'&language=en-US&append_to_response=keywords').then(function(d){
    var g=(d.genres||[]).map(function(x){return x.name.toLowerCase()});
    var k=((d.keywords&&d.keywords.results)||[]).map(function(x){return x.name.toLowerCase()});
    var all=g.concat(k).join(' ');var genre='autre';
    if(KW_ISEKAI.some(function(w){return all.indexOf(w)>-1}))genre='isekai';
    else if(KW_SLICE.some(function(w){return all.indexOf(w)>-1}))genre='slice';
    else if(KW_SHOJO.some(function(w){return all.indexOf(w)>-1}))genre='shojo';
    else if(KW_SEINEN.some(function(w){return all.indexOf(w)>-1}))genre='seinen';
    else if(KW_SHONEN.some(function(w){return all.indexOf(w)>-1}))genre='shonen';
    else if(all.indexOf('action')>-1||all.indexOf('adventure')>-1)genre='shonen';
    cb(genre);
  }).catch(function(){cb('autre');});
}

/* RENDER */
function getItems(tab,stat,q){
  var items=memDB.slice();
  if(tab&&tab!='all')items=items.filter(function(i){return i.type==tab});
  if(stat&&stat!='all')items=items.filter(function(i){if(stat=='avoir')return i.status=='avoir'||i.status=='todo';return i.status==stat});
  if(q){var ql=q.toLowerCase();items=items.filter(function(i){return(i.title&&i.title.toLowerCase().indexOf(ql)>-1)||(i.tags&&i.tags.join(' ').toLowerCase().indexOf(ql)>-1)});}
  var so=document.getElementById('sortSel').value;
  items.sort(function(a,b){
    if(so=='title')return(a.title||'').localeCompare(b.title||'');
    if(so=='tmdb')return(parseFloat(b.tmdbScore)||0)-(parseFloat(a.tmdbScore)||0);
    if(so=='myrate')return(b.myRating||0)-(a.myRating||0);
    return(b.addedAt||0)-(a.addedAt||0);
  });
  return items;
}

var INIT_VISIBLE=15,LOAD_MORE_STEP=10;
function loadMoreSec(secId,btn){
  var grid=document.querySelector('#'+secId+' .grid');if(!grid)return;
  var hidden=Array.from(grid.querySelectorAll('[data-more="1"]:not(.revealed)'));
  var toShow=hidden.slice(0,LOAD_MORE_STEP);
  toShow.forEach(function(el,i){el.style.animationDelay=(i*0.035)+'s';el.classList.add('revealed');});
  var left=hidden.length-LOAD_MORE_STEP;
  if(left<=0){if(btn&&btn.parentElement)btn.parentElement.style.display='none';}
  else if(btn)btn.textContent='Charger plus · '+left+' autre'+(left>1?'s':'');
}
function secHtml(label,items){
  if(!items.length)return'';
  var colGroups={},singles=[];
  items.forEach(function(item){if(item.collectionId){if(!colGroups[item.collectionId])colGroups[item.collectionId]=[];colGroups[item.collectionId].push(item);}else{singles.push(item);}});
  Object.keys(colGroups).forEach(function(cid){if(colGroups[cid].length<2){singles.push(colGroups[cid][0]);delete colGroups[cid];}});
  var blocks=[];
  Object.keys(colGroups).forEach(function(cid){var g=colGroups[cid];var minAt=Math.min.apply(null,g.map(function(i){return i.addedAt||0;}));blocks.push({type:'folder',cid:cid,items:g,at:minAt});});
  singles.forEach(function(item){blocks.push({type:'card',item:item,at:item.addedAt||0});});
  blocks.sort(function(a,b){return b.at-a.at;});
  var secId='s'+Math.random().toString(36).slice(2,8);
  var gridClass='grid'+(compactOn?' cpt':'');
  var h='<div class="sec" id="'+secId+'"><div class="sec-hd"><div class="sec-title">'+label+'</div></div><div class="'+gridClass+'">';
  blocks.forEach(function(b,i){
    var more=i>=INIT_VISIBLE?'data-more="1"':'';
    if(b.type==='folder')h+=folderCardHtml(b.cid,b.items,more);
    else h+=cardHtml(b.item,i,more);
  });
  h+='</div>';
  var rem=blocks.length-INIT_VISIBLE;
  if(rem>0)h+='<div class="load-more-wrap"><button class="load-more-btn" onclick="loadMoreSec(\''+secId+'\',this)">Charger plus \xb7 '+rem+' autre'+(rem>1?'s':'')+'</button><span class="load-more-count">'+blocks.length+' au total</span></div>';
  return h+'</div>';
}

  var best=null;
  pool.forEach(function(i){if(i.myRating&&(!best||i.myRating>best.myRating))best=i;});
  if(!best)pool.forEach(function(i){if(i.tmdbScore&&(!best||parseFloat(i.tmdbScore)>parseFloat(best.tmdbScore||0)))best=i;});
  if(!best)return Promise.resolve({title:'',items:[]});
  var t=best.tmdbType||(best.type==='film'?'movie':'tv');
  var inL=memDB.map(function(i){return i.tmdbId;});
  return fetch(TB+'/'+t+'/'+best.tmdbId+'/recommendations?api_key='+TKEY+'&language=fr-FR&page=1')
    .then(function(r){return r.json();}).then(function(d){
      var items=(d.results||[]).filter(function(x){return inL.indexOf(x.id)<0&&dismissed.indexOf(x.id)<0;}).slice(0,30).map(function(x){return _drNormItem(x,null);});
      return{title:best.title,items:items};
    }).catch(function(){return{title:'',items:[]};});
}
function _drFetchRow(cfg){
  var inL=memDB.map(function(i){return i.tmdbId;});
  if(cfg.type==='because')return _drFetchBecause(cfg.filter);
  var sep=cfg.url.indexOf('?')>-1?'&':'?';
  var pg1=Math.ceil(Math.random()*5),pg2=pg1===1?2:pg1-1;
  /* Fetch 2 pages en parallèle pour avoir 30+ items */
  var u1=TB+cfg.url+sep+'api_key='+TKEY+'&language=fr-FR&page='+pg1;
  var u2=TB+cfg.url+sep+'api_key='+TKEY+'&language=fr-FR&page='+pg2;
  return Promise.all([
    fetch(u1).then(function(r){return r.json();}).catch(function(){return{results:[]};}),
    fetch(u2).then(function(r){return r.json();}).catch(function(){return{results:[]};})
  ]).then(function(pages){
    var seen={};var combined=[];
    pages.forEach(function(data){
      (data.results||[]).forEach(function(x){
        if(!seen[x.id]){seen[x.id]=1;combined.push(x);}
      });
    });
    var items=combined.filter(function(x){
      var id=x.id||x.tmdbId;
      return inL.indexOf(id)<0&&dismissed.indexOf(id)<0&&x.poster_path&&
        (cfg.mixed?true:(x.media_type?x.media_type===(cfg.mtype||'movie'):true));
    }).slice(0,30).map(function(x){return _drNormItem(x,cfg.mtype||null);});
    return{title:null,items:items};
  });
}

/* CARD SIZE DYNAMIQUE — 10 cards visibles exactement */
function _calcDrCardSize(){
  var sec=document.getElementById('discoverSection');
  if(!sec)return;
  var w=sec.offsetWidth;
  /* 48px padding chaque côté (flèches) + 9 gaps de 10px entre 10 cards */
  var available=w-96-(9*10);
  var cw=Math.max(90,Math.floor(available/10));
  var ch=Math.floor(cw*1.5);
  document.documentElement.style.setProperty('--dr-card-w',cw+'px');
  document.documentElement.style.setProperty('--dr-card-h',ch+'px');
}
function _animHScroll(el,to,dur){
  var from=el.scrollLeft,start=performance.now();
  var max=el.scrollWidth-el.clientWidth;
  to=Math.max(0,Math.min(to,max));
  function frame(now){
    var p=Math.min(1,(now-start)/dur);
    el.scrollLeft=from+(to-from)*easeInOutCubic(p);
    if(p<1)requestAnimationFrame(frame);else el.scrollLeft=to;
  }
  requestAnimationFrame(frame);
}
function drScrollRow(innerId,dir){
  var el=document.getElementById(innerId);if(!el)return;
  var cw=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--dr-card-w'))||126;
  var step=(cw+10)*10;/* 10 cards exactement */
  _animHScroll(el,el.scrollLeft+dir*step,560);
}
function _renderDrRow(cfg,data,tab){
  var rowId='dr-'+tab+'-'+cfg.id;
  var innerId='dr-inner-'+tab+'-'+cfg.id;
  var row=document.getElementById(rowId);if(!row)return;
  var items=data.items||[];
  if(!items.length){row.style.display='none';return;}
  var label=cfg.title+(cfg.type==='because'&&data.title?' <em>'+esc(data.title.slice(0,20))+'</em>':'');
  row.innerHTML=
    '<div class="dr-row-head">'+
      '<div class="dr-row-title">'+label+'</div>'+
    '</div>'+
    '<div class="dr-row-wrap">'+
      '<button class="dr-arrow left" onclick="drScrollRow(\''+innerId+'\',-1)" aria-label="Précédent">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>'+
      '</button>'+
      '<div class="dr-row-inner" id="'+innerId+'">'+items.map(_drCardHtml).join('')+'</div>'+
      '<button class="dr-arrow right" onclick="drScrollRow(\''+innerId+'\',1)" aria-label="Suivant">'+
        '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>'+
      '</button>'+
    '</div>';
}
function loadDiscovery(tab){
  var sec=document.getElementById('discoverSection');if(!sec)return;
  _calcDrCardSize();/* Calculer la taille des cards avant de render */
  var cfgs=DISCOVER_CONFIG[tab]||DISCOVER_CONFIG.all;
  /* Construire les rows skeleton */
  sec.innerHTML=cfgs.map(function(cfg){
    var rowId='dr-'+tab+'-'+cfg.id;
    return '<div class="dr-row" id="'+rowId+'">'+
      '<div class="dr-row-head"><div class="dr-row-title">'+esc(cfg.title)+'</div></div>'+
      '<div class="dr-skeleton-row">'+_drSkeletonHtml()+'</div>'+
    '</div>';
  }).join('');
  /* Fetch toutes les rows en parallèle */
  cfgs.forEach(function(cfg){
    var cacheKey=tab+':'+cfg.id;
    if(_drCache[cacheKey]){_renderDrRow(cfg,_drCache[cacheKey],tab);return;}
    _drFetchRow(cfg).then(function(data){
      _drCache[cacheKey]=data;
      _renderDrRow(cfg,data,tab);
    });
  });
}

        function toR(x,type){var isM=type=='movie';return{tmdbId:x.id,type:type,title:isM?x.title:x.name,year:isM?(x.release_date||'').slice(0,4):(x.first_air_date||'').slice(0,4),poster:x.poster_path,score:x.vote_average?x.vote_average.toFixed(1):'',overview:x.overview};}

function renderRecos(tHtml,bHtml,json,inList){

  function extractItems(html){
    /* On passe les raw data dans json directement */
    return [];
  }

    if(!items.length)return'';

  if(bHtml)html+=bHtml.replace(/class="reco-card"/g,function(){return 'class="reco-card" data-idx="'+(counter++)+'\"';});
  /* Discover : flux continu par type sans header répété */

  secs.forEach(function(s){

  var ctr=0;

  /* Réinjecter proprement via DOM serait idéal mais on injecte innerHTML direct */
  document.getElementById('sbContent').innerHTML=html||'<div class="sb-loading">Aucune recommandation</div>';

/* AUTO-DÉTECTION COLLECTIONS TMDB */
var _detectRunning=false;
function detectCollections(){
  if(_detectRunning)return;
  var films=memDB.filter(function(i){return(i.type==='film'||i.tmdbType==='movie')&&i.tmdbId&&!i.collectionId;});
  if(!films.length){toast('Tous les films ont déjà une saga ou pas de collection.','nfo');return;}
  _detectRunning=true;
  toast('Détection des sagas en cours ('+films.length+' films)…','nfo');
  var updated=0,done=0;
  function next(idx){
    if(idx>=films.length){_detectRunning=false;if(updated>0){render();toast(updated+' saga'+(updated>1?'s':'')+' détectée'+(updated>1?'s':'')+'.');} else{toast('Aucune nouvelle saga détectée.','nfo');}return;}
    var item=films[idx];
    fetch(TB+'/movie/'+item.tmdbId+'?api_key='+TKEY+'&language=fr-FR').then(function(r){return r.json();}).then(function(d){
      if(d.belongs_to_collection&&d.belongs_to_collection.name){
        var cname=d.belongs_to_collection.name.replace(/\s*collection$/i,'').replace(/\s*saga$/i,'').trim();
        var cid=_slugify(cname);
        item.collectionId=cid;item.collectionName=cname;item.tmdbCollectionId=d.belongs_to_collection.id;
        for(var k=0;k<memDB.length;k++){if(memDB[k].id===item.id){memDB[k]=item;break;}}

/* AUTO SCROLL — RAF UNIQUE, ANNULABLE, SANS SMOOTH NATIF */
var autoRAF2=0,autoSeq2=0;
function easeInOutCubic(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function stopAutoScroll(){autoSeq2++;if(autoRAF2)cancelAnimationFrame(autoRAF2);autoRAF2=0;if(autoTimer){clearTimeout(autoTimer);autoTimer=null;}}
function _animScrollTo(el,to,dur){return new Promise(function(resolve){var seq=autoSeq2,from=el.scrollTop,start=performance.now();var max=Math.max(0,el.scrollHeight-el.clientHeight);to=Math.max(0,Math.min(to,max));function frame(now){if(seq!==autoSeq2)return resolve(false);if(autoPaused){autoRAF2=requestAnimationFrame(frame);return;}var p=Math.min(1,(now-start)/dur);el.scrollTop=from+(to-from)*easeInOutCubic(p);if(p<1){autoRAF2=requestAnimationFrame(frame);}else{el.scrollTop=to;autoRAF2=0;resolve(true);}}autoRAF2=requestAnimationFrame(frame);});}
async function startAutoScroll(){
  stopAutoScroll();var wrap=document.getElementById('sbScroll');if(!wrap)return;var seq=autoSeq2;
  while(seq===autoSeq2){
    if(autoPaused||wrap.scrollHeight<=wrap.clientHeight){await new Promise(function(r){autoTimer=setTimeout(r,300);});continue;}
    var max=wrap.scrollHeight-wrap.clientHeight;var target=Math.min(wrap.scrollTop+180,max);
    await _animScrollTo(wrap,target,1600);if(seq!==autoSeq2)break;
    await new Promise(function(r){autoTimer=setTimeout(r,400);});if(seq!==autoSeq2)break;
    if(wrap.scrollTop>=max-2){wrap.scrollTop=0;await new Promise(function(r){autoTimer=setTimeout(r,700);});}
  }
}
document.getElementById('sbScroll').addEventListener('mouseenter',function(){autoPaused=true;});
document.getElementById('sbScroll').addEventListener('mouseleave',function(){autoPaused=false;});

/* AMBIENT COLOR — canvas same-origin via proxy */
function applyAmbient(imgUrl, targetEl, opacity){
  if(!imgUrl||!targetEl)return;
  opacity=opacity||0.10;
  var img=new Image();
  img.crossOrigin='anonymous';
  img.onload=function(){
    try{
      var c=document.createElement('canvas');
      c.width=8;c.height=8;
      var ctx=c.getContext('2d');
      ctx.drawImage(img,0,0,8,8);
      var d=ctx.getImageData(0,0,8,8).data;
      var r=0,g=0,b=0,n=0;
      for(var i=0;i<d.length;i+=4){if(d[i+3]>10){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}}
      if(!n)return;
      r=Math.round(r/n);g=Math.round(g/n);b=Math.round(b/n);
      var col='rgba('+r+','+g+','+b+','+opacity+')';
      targetEl.style.setProperty('--ambient-color',col);
      targetEl.style.background='radial-gradient(ellipse at top center, var(--ambient-color) 0%, transparent 70%)';
    }catch(e){
      /* Canvas tainted ou autre erreur — dégradation silencieuse */
      targetEl.style.background='';
    }
  };
  img.onerror=function(){targetEl.style.background='';};
  img.src=proxied(imgUrl);
}

function processCSVRows(rows){

    if(idx>=valid.length){
      toast('Import OK — '+added+' ajoutes, '+failed+' erreurs');
      render();loadRecos();return;
    }
    var row=valid[idx];

    tf(TB+'/search/'+(row.type=='film'?'movie':'tv')+'?api_key='+TKEY+'&query='+encodeURIComponent(query)+'&language=fr-FR').then(function(d){
      var results=d.results||[];
      if(!results.length){failed++;processNext(idx+1);return;}
      var match=results[0];
      var id=makeId();
      var entry={
        id:id,
        tmdbId:match.id,
        type:row.type=='film'?'film':'serie',
        tmdbType:row.type=='film'?'movie':'tv',
        title:row.title,
        status:row.status||'avoir',
        my_rating:row.my_rating?parseInt(row.my_rating):null,
        poster:match.poster_path||null,
        overview:match.overview||'',
        tags:(row.tags||'').split('|').map(function(t){return t.trim()}).filter(Boolean),
        saison:row.saison?parseInt(row.saison):null,
        episode:row.episode?parseInt(row.episode):null,
        tmdb_score:match.vote_average||null,
        added_at:Date.now(),
        updated_at:Date.now(),
        device_id:getDeviceId()
      };
      memDB.unshift(entry);
      dbPut(entry,null);
      added++;
      setTimeout(function(){processNext(idx+1);},100); // Throttle API calls
    }).catch(function(){failed++;processNext(idx+1);});
  }
  processNext(0);
}

function _searchTMDB(q,page){
  q=(q||'').trim();page=page||1;
  if(q.length<2)return Promise.resolve({results:[],page:1,total_pages:1,total_results:0});
  var sfType=document.getElementById('sfType');
  var sfSort=document.getElementById('sfSort');
  var sfYear=document.getElementById('sfYear');
  var typeFilter=sfType?sfType.value:'';
  var sortFilter=sfSort?sfSort.value:'';
  var yearFilter=sfYear?sfYear.value:'';
  /* Si filtres actifs, utiliser discover au lieu de search/multi */
  if(typeFilter&&sortFilter){
    var ep=typeFilter==='movie'?'/discover/movie':'/discover/tv';
    var params='?api_key='+TKEY+'&language=fr-FR&page='+page+'&sort_by='+sortFilter+'&with_text_query='+encodeURIComponent(q);
    if(yearFilter&&typeFilter==='movie')params+='&primary_release_date.gte='+yearFilter+'-01-01';
    if(yearFilter&&typeFilter==='tv')params+='&first_air_date.gte='+yearFilter+'-01-01';
    var url2=TB+ep+params;
    return tf(url2).then(function(data){
      var mtype=typeFilter;
      var list=(data.results||[]).filter(function(r){return(r.title||r.name)&&!_inDismissed(r.id);}).slice(0,20).map(function(r){
        var isM=mtype==='movie';
        return _normSR(Object.assign({},r,{media_type:mtype}));
      });
      return{results:list,page:data.page||1,total_pages:Math.max(1,Math.min(data.total_pages||1,50)),total_results:data.total_results||list.length};
    });
  }
  /* Sinon search/multi standard + filtre type côté client si demandé */
  var url=TB+'/search/multi?api_key='+TKEY+'&language=fr-FR&query='+encodeURIComponent(q)+'&page='+page+'&include_adult=false';
  return tf(url).then(function(data){
    var list=(data.results||[]).filter(function(r){
      if(!(r.media_type==='movie'||r.media_type==='tv'))return false;
      if(!(r.title||r.name))return false;
      if(_inDismissed(r.id))return false;
      if(typeFilter&&r.media_type!==typeFilter)return false;
      if(yearFilter){var yr=(r.media_type==='movie'?(r.release_date||''):(r.first_air_date||'')).slice(0,4);if(parseInt(yr)<parseInt(yearFilter))return false;}
      return true;
    }).slice(0,20).map(_normSR);
    return{results:list,page:data.page||1,total_pages:Math.max(1,Math.min(data.total_pages||1,50)),total_results:data.total_results||list.length};
  });
}

function _renderSR(results){
  var wrap=document.getElementById('searchResults');
  if(!results||!results.length){wrap.innerHTML='<div class="search-empty">Aucun résultat.</div>';_updateCounter();_updatePager();return;}
  wrap.innerHTML=results.map(function(d){
    var inList=_inList(d.tmdbId);var sel=!!searchState.selected[d.key];
    var poster=d.poster?'<img class="search-poster" src="'+IB+'w185'+d.poster+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">':'<div class="search-poster-ph">'+icon(d.type)+'</div>';
    var chk='<button class="search-check'+(sel?' on':'')+'" type="button" aria-label="Sélectionner '+esc(d.title)+'" aria-pressed="'+(sel?'true':'false')+'" '+(inList?'disabled':'')+' onclick="event.stopPropagation();toggleSCard(\''+esc(d.key)+'\')"><span class="search-check-box"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg></span></button>';
    var stag=inList?'<div class="search-status-tag off">Déjà dans ta liste</div>':'<div class="search-status-tag ok">Ajoutable</div>';
    return '<article class="search-card'+(sel?' selected':'')+(inList?' disabled':'')+'" data-key="'+esc(d.key)+'" tabindex="0">'+chk+'<div class="search-poster-wrap">'+poster+'</div><div class="search-body"><div class="search-title">'+esc(d.title)+'</div><div class="search-meta">'+tbadge(d.type)+'<span class="search-year">'+esc(d.year)+'</span>'+(d.score?'<span class="badge bec">★ '+esc(String(d.score))+'</span>':'')+'</div><div class="search-overview">'+esc(d.overview||'Aucune description.')+'</div>'+stag+'</div></article>';
  }).join('');
  _updateCounter();_updatePager();
}

function toggleSCard(key){
  var item=searchState.results.find(function(x){return x.key===key;});
  if(!item||_inList(item.tmdbId))return;
  searchState.selected[key]=!searchState.selected[key];
  if(!searchState.selected[key])delete searchState.selected[key];
  _renderSR(searchState.results);
}

function addSelectedBatch(){
  var sel=searchState.results.filter(function(x){return !!searchState.selected[x.key]&&!_inList(x.tmdbId);});
  if(!sel.length)return;
  var added=0,skipped=0;
  sel.forEach(function(d){var r=addSearchEntryDirect(d);if(r.ok)added++;else skipped++;});
  searchState.selected={};_updateCounter();
  if(added){render();loadRecos();toast(added+' titre'+(added>1?'s':'')+' ajouté'+(added>1?'s':'')+' · à qualifier');sfx('add');}
  else{toast('Aucun titre ajoutable.','nfo');}
  _renderSR(searchState.results);
}

function _runSearch(query,page){
  var q=(query||'').trim();searchState.query=q;searchState.page=page||1;searchState.token++;var tok=searchState.token;
  if(q.length<2){searchState.results=[];searchState.totalPages=1;_stateText('Tape au moins 2 caractères');_renderSR([]);return;}
  _setSearchLoad(true);_stateText('Recherche de "'+q+'"…');
  _searchTMDB(q,searchState.page).then(function(res){
    if(tok!==searchState.token)return;
    searchState.results=res.results||[];searchState.page=res.page||1;searchState.totalPages=res.total_pages||1;
    _stateText((res.total_results||searchState.results.length)+' résultat'+(((res.total_results||searchState.results.length)>1)?'s':'')+' · page '+searchState.page);
    _renderSR(searchState.results);
  }).catch(function(){
    if(tok!==searchState.token)return;
    searchState.results=[];_stateText('Erreur réseau / TMDB.');_renderSR([]);toast('Erreur TMDB','err');sfx('err');
  }).finally(function(){if(tok!==searchState.token)return;_setSearchLoad(false);_updatePager();});
}
function searchPage(delta){if(searchState.loading)return;var n=searchState.page+delta;if(n<1||n>searchState.totalPages)return;_runSearch(searchState.query,n);}

var _dbSearch=debounce(function(){_runSearch(document.getElementById('searchModalInput').value,1);},300);

function bindSearchModalEvents(){
  var hIn=document.getElementById('tmdbSearchInput');
  var mIn=document.getElementById('searchModalInput');
  var modal=document.getElementById('searchModal');
  var res=document.getElementById('searchResults');
  hIn.addEventListener('focus',function(){if(searchState.ignoreFocus)return;openSearchModal(this.value.trim());});
  hIn.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();openSearchModal(this.value.trim());}});
  hIn.addEventListener('input',debounce(function(){if(this.value.trim().length>=2)openSearchModal(this.value.trim());},320));
  mIn.addEventListener('input',function(){_dbSearch();});
  mIn.addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();_runSearch(this.value,1);}});
  modal.addEventListener('click',function(e){if(e.target===this)closeSearchModal();});
  res.addEventListener('click',function(e){
    var card=e.target.closest('.search-card');if(!card)return;
    var item=searchState.results.find(function(x){return x.key===card.dataset.key;});
    if(!item||_inList(item.tmdbId))return;toggleSCard(card.dataset.key);
  });
  res.addEventListener('keydown',function(e){
    var card=e.target.closest('.search-card');if(!card)return;
    if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleSCard(card.dataset.key);}
  });
  document.addEventListener('keydown',function(e){
    var open=document.getElementById('searchModal').classList.contains('on');
    if(open&&e.key==='Escape'){e.preventDefault();sfx('close');closeSearchModal();return;}
    if(!open&&(e.key==='/'||(e.key==='k'&&(e.ctrlKey||e.metaKey)))){e.preventDefault();sfx('click');openSearchModal(document.getElementById('tmdbSearchInput').value.trim());}
  });
}

// ===== AUTO-SAVE LOCALSTORAGE (30s) =====
// Sauvegarde de secours des préférences user toutes les 30s
// (IndexedDB gère la watchlist principale — localStorage gère prefs/dismissed)
setInterval(function() {
  try {
    localStorage.setItem('wl_dis', JSON.stringify(dismissed));
    localStorage.setItem('wl_snd', soundOn ? '1' : '0');
    localStorage.setItem('wl_cpt', compactOn ? '1' : '0');
    var ts = new Date().toLocaleTimeString();
    console.log('[' + ts + '] Prefs sauvegardées');
  } catch(e) {
    console.warn('Auto-save failed:', e);
  }
}, 30000);

// ===== DÉTECTION OFFLINE / ONLINE =====
window.addEventListener('online', function() {
  console.log('[' + new Date().toLocaleTimeString() + '] ✓ App en ligne');
  if (typeof loadRecos === 'function') loadRecos();
});
window.addEventListener('offline', function() {
  console.warn('[' + new Date().toLocaleTimeString() + '] ⚠ App HORS LIGNE — TMDB inaccessible');
});

// ===== EXPORT WATCHLIST JSON =====
document.getElementById('exportBtn') && document.getElementById('exportBtn').addEventListener('click', function() {
  // Lit IndexedDB directement (store 'entries' — architecture existante)
  if (!idb) { alert('Base non initialisée'); return; }
  var req = idb.transaction('entries', 'readonly').objectStore('entries').getAll();
  req.onsuccess = function() {
    var items = req.result || [];
    var data = {
      version: '1.0',
      exportedAt: new Date().toISOString(),
      count: items.length,
      items: items
    };
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'watchlist-' + new Date().toISOString().slice(0, 10) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    sfx('click');
    console.log('[Export] ' + items.length + ' items exportés');
  };
});

// ===== IMPORT WATCHLIST JSON =====
document.getElementById('importBtn') && document.getElementById('importBtn').addEventListener('click', function() {
  document.getElementById('importFile').click();
});

document.getElementById('importFile') && document.getElementById('importFile').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(evt) {
    try {
      var data = JSON.parse(evt.target.result);
      if (!data.items || !Array.isArray(data.items)) {
        alert('❌ Format invalide : propriété "items" manquante');
        return;
      }
      // Merge via memDB + dbPut (architecture existante — pas de doublon par id)
      var existingIds = new Set(memDB.map(function(x) { return x.id; }));
      var added = 0, skipped = 0;
      data.items.forEach(function(item) {
        if (item && item.id && !existingIds.has(item.id)) {
          memDB.push(item);
          dbPut(item);
          added++;
        } else {
          skipped++;
        }
      });
      render();
      updateStatsFooter();
      sfx('click');
      alert('✓ Import terminé : ' + added + ' ajoutés, ' + skipped + ' déjà présents');
    } catch(err) {
      alert('❌ Fichier JSON invalide : ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

// ===== STATS FOOTER =====
function updateStatsFooter() {
  var el = document.getElementById('statsFooter');
  if (!el) return;
  // Lit memDB (synchronisé avec IndexedDB) — statuts réels : termine/encours/avoir/todo
  var items = memDB || [];
  var termine = items.filter(function(w) { return w.status === 'termine'; }).length;
  var encours = items.filter(function(w) { return w.status === 'encours'; }).length;
  var avoir   = items.filter(function(w) { return w.status === 'avoir'; }).length;
  el.textContent = items.length + ' titres — ' + termine + ' terminés · ' + encours + ' en cours · ' + avoir + ' à voir';
}

</script>
